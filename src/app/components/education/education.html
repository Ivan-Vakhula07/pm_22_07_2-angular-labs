<div class="section_container mb-4">
  <div class="d-flex justify-content-between align-items-center cursor-pointer border-bottom mb-3 pb-2" (click)="toggle()">
    <h3 class="text-uppercase fs-4 m-0 fw-bold border-bottom border-primary border-3 pb-1">Освіта</h3>
    <i class="bi fs-4 text-primary" [class.bi-chevron-up]="isOpen()" [class.bi-chevron-down]="!isOpen()"></i>
  </div>
  @if (isOpen()) {
  @for (edu of list(); track edu.university) {
  <div class="card mb-3 border-primary border-start border-4 shadow-sm">
    <div class="card-body p-3">
      <h5 class="fw-bold mb-1">{{ edu.degree }}</h5>
      <p class="mb-0 small text-secondary">{{ edu.university }} <span class="badge bg-primary">{{ edu.years }}</span></p>
    </div>
  </div>
  }
  }
</div>
