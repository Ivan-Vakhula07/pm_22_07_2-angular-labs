<div class="languages mb-4">
  <h3 class="left_title text-uppercase fs-5 border-bottom pb-2">Мови</h3>
  @for (lang of languages(); track lang.name) {
  <div class="language_item mb-2">
    <p class="mb-1 small text-white">{{ lang.name }}</p>
    <div class="progress" style="height: 5px; background: rgba(255,255,255,0.1)">
      <div class="progress-bar bg-info" [style.width]="lang.level"></div>
    </div>
  </div>
  }
</div>
