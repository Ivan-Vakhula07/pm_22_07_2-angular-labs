<div class="hobbies">
  <h3 class="left_title text-uppercase fs-5 border-bottom pb-2">Хобі</h3>
  <div class="row g-2 text-center small">
    @for (hobby of hobbies; track hobby.name) {
    <div class="col-6 mb-2">
      <div class="rounded-circle d-inline-block mb-1 overflow-hidden" style="width: 50px; height: 50px; border: 2px solid white;">
        <img [src]="hobby.img" [alt]="hobby.name" class="w-100 h-100 object-fit-cover">
      </div>
      <p class="m-0 text-white">{{ hobby.name }}</p>
    </div>
    }
  </div>
</div>
